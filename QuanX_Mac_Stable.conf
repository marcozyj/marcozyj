#############################################
# Quantumult X for macOS - 精简落地配置
# 结合：fmz200/wool_scripts QuanX.conf + Anonymous0632 Quantumult-X-Scripts-Rules
# 取向：Mac 稳定可用 / 分流优先 / 重写保守 / 不内置任何第三方 p12 证书
# 更新：2026-06-22
#############################################

[general]
# 连通性与测速
server_check_url=http://www.gstatic.com/generate_204
network_check_url=http://www.baidu.com
server_check_timeout=3000

# 节点页 IP 信息展示
geo_location_checker=http://ip-api.com/json/?fields=8450015&lang=zh-CN,https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
profile_img_url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/author/fmz200-01.png

# Mac 局域网/私有地址直连，避免投屏、NAS、打印机、路由器管理异常
excluded_routes=172.16.0.0/12, 100.64.0.0/10, 10.0.0.0/8, 127.0.0.0/8, 169.254.0.0/16, 192.168.0.0/16, 224.0.0.0/4, 239.255.255.250/32
fallback_udp_policy=direct
udp_drop_list=443

# 这些域名不走 fake-ip，避免银行/运营商/登录类异常
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com, *.local, localhost

[dns]
# Mac 端保守 DNS：不强制 no-system，减少公司/校园/内网 DNS 异常
no-ipv6
server=223.5.5.5
server=119.29.29.29
server=114.114.114.114
server=8.8.8.8
server=1.1.1.1
doh-server=https://dns.alidns.com/dns-query, https://doh.pub/dns-query, https://cloudflare-dns.com/dns-query

# 常见国内服务指定国内 DNS
server=/*.alipay.com/223.5.5.5
server=/*.taobao.com/223.5.5.5
server=/*.tmall.com/223.5.5.5
server=/*.alicdn.com/223.5.5.5
server=/*.aliyun.com/223.5.5.5
server=/*.tencent.com/119.29.29.29
server=/*.weixin.com/119.29.29.29
server=/*.qq.com/119.29.29.29
server=/*.jd.com/119.29.29.29
server=/*.bilibili.com/119.29.29.29
server=/hdslb.com/119.29.29.29
server=/*.163.com/119.29.29.29
server=/*.126.com/119.29.29.29
server=/*.126.net/119.29.29.29
server=/*.netease.com/119.29.29.29
server=/*.mi.com/119.29.29.29
server=/*.xiaomi.com/119.29.29.29

# 路由器/局域网域名走系统 DNS
server=/amplifi.lan/system
server=/router.synology.com/system
server=/router.asus.com/system
server=/routerlogin.net/system
server=/orbilogin.com/system
server=/www.miwifi.com/system
server=/miwifi.com/system
server=/tplogin.cn/system
server=/tplinklogin.net/system
server=/melogin.cn/system
server=/falogin.cn/system
server=/local/system

[policy]
# 总选择
static=手动选择, 自动测速, 香港节点, 日本节点, 新加坡节点, 美国节点, 其他节点, proxy, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
url-latency-benchmark=自动测速, server-tag-regex=.*, check-interval=600, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Speedtest.png

# 地区测速组；已修正原配置里部分正则尾部空匹配问题
url-latency-benchmark=香港节点, server-tag-regex=(🇭🇰|香港|港区|港节点|HK|HKG|Hong.?Kong), check-interval=600, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
url-latency-benchmark=日本节点, server-tag-regex=(🇯🇵|日本|东京|東京|大阪|JP|JPN|Japan|Tokyo|Osaka), check-interval=600, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
url-latency-benchmark=新加坡节点, server-tag-regex=(🇸🇬|新加坡|狮城|獅城|SG|SGP|Singapore), check-interval=600, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
url-latency-benchmark=美国节点, server-tag-regex=(🇺🇸|美国|美國|美西|美东|美東|洛杉矶|洛杉磯|西雅图|西雅圖|圣何塞|聖荷西|纽约|紐約|达拉斯|芝加哥|US|USA|United.?States|America|Los.?Angeles|Seattle|San.?Jose|New.?York|Dallas|Chicago), check-interval=600, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
url-latency-benchmark=其他节点, server-tag-regex=^(?!.*(🇭🇰|香港|港区|港节点|HK|HKG|Hong.?Kong|🇯🇵|日本|东京|東京|大阪|JP|JPN|Japan|Tokyo|Osaka|🇸🇬|新加坡|狮城|獅城|SG|SGP|Singapore|🇺🇸|美国|美國|美西|美东|美東|洛杉矶|洛杉磯|西雅图|西雅圖|圣何塞|聖荷西|纽约|紐約|US|USA|United.?States|America|Los.?Angeles|Seattle|San.?Jose|New.?York)).+$, check-interval=600, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/World_Map.png

