mode: rule
log-level: info

dns:
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fake-ip-filter:
    - "+.lan"
    - "*"
    - "+.local"
    - "+.cmpassport.com"
    - "id6.me"
    - "open.e.189.cn"
    - "mdn.open.wo.cn"
    - "opencloud.wostore.cn"
    - "auth.wosms.cn"
    - "+.10099.com.cn"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "lancache.steamcontent.com"

# 可选：填写 Stash 配置订阅更新地址
subscribe-url:

proxy-providers:
  Subscribe:
    interval: 86400
    url: http://your-service-provider
    benchmark-timeout: 5
    benchmark-url: http://1.1.1.1/generate_204

proxy-groups:

  # ================================
  # 主策略组
  # ================================

  - name: 手动选择
    icon: https://raw.githubusercontent.com/shindgewongxj/WHATSINStash/main/icon/%24tash.png
    type: select
    use:
      - Subscribe
    proxies:
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - DIRECT

  - name: 全球代理
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png
    type: select
    proxies:
      - 手动选择
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点

  - name: 流媒体
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png
    type: select
    proxies:
      - 手动选择
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点

  - name: 微软服务
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Microsoft.png
    type: select
    proxies:
      - 手动选择
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点

  - name: 谷歌服务
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png
    type: select
    proxies:
      - 手动选择
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点

  - name: 人工智能
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/OpenAI.png
    type: select
    proxies:
      - 手动选择
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点

  - name: 社交媒体
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Twitter.png
    type: select
    proxies:
      - 手动选择
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点

  - name: 电报消息
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
    type: select
    proxies:
      - 手动选择
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点

  - name: 游戏平台
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Game.png
    type: select
    proxies:
      - 手动选择
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - DIRECT

  # Emby 已改为和其他业务策略组相同
  # 不再使用 include-all，因此不会直接显示所有订阅节点
  - name: Emby媒体
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Emby.png
    type: select
    proxies:
      - 手动选择
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点

  - name: Spotify音乐
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Spotify.png
    type: select
    proxies:
      - 手动选择
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点

  - name: 最终兜底
    icon: https://raw.githubusercontent.com/shindgewongxj/WHATSINStash/main/icon/friestash.png
    type: select
    proxies:
      - 手动选择
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - DIRECT

  # ================================
  # 地区自动测速组
  # ================================

  - name: 香港节点
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
    type: url-test
    interval: 300
    include-all: true
    filter: '(?i)🇭🇰|香港|九龙|(\b(HK|Hong|HongKong|Hong Kong)\b)'

  - name: 美国节点
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
    type: url-test
    interval: 300
    include-all: true
    filter: '(?i)🇺🇸|美国|洛杉矶|圣何塞|西雅图|纽约|达拉斯|芝加哥|(\b(US|USA|United States)\b)'

  - name: 新加坡节点
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
    type: url-test
    interval: 300
    include-all: true
    filter: '(?i)🇸🇬|新加坡|狮城|(\b(SG|Singapore)\b)'

  - name: 日本节点
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
    type: url-test
    interval: 300
    include-all: true
    filter: '(?i)🇯🇵|日本|东京|大阪|埼玉|(\b(JP|Japan)\b)'

  - name: 台湾节点
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
    type: url-test
    interval: 300
    include-all: true
    filter: '(?i)🇹🇼|台湾|台灣|台北|新北|高雄|彰化|(\b(TW|Taiwan)\b)'

