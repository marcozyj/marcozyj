# update: 2026-06-11
# 简介: https://github.com/echs-top/proxy

# 节点IP优先级：ip-version: ipv6-prefer
# 测速细分/筛选：https://8.8.8.8/generate_204、https://[2001:4860:4860::8888]/generate_204
providers: &providers { type: http, interval: 86400, proxy: 直接连接, header: { User-Agent: ["clash-verge/v2.5.1"] }, health-check: { enable: true, url: 'https://dns.google/generate_204', expected-status: 204,  interval: 600, timeout: 3000, max-failed-times: 2, lazy: true }, override: { ip-version: dual }, exclude-filter: '(?i)套餐|剩余|流量|到期|重置|频道|订阅|官网|禁止|客户端|有效|联系|测试|节点|日期|群组|加入|通知|维护|网址|地址|下载|更新|APP|登录|严禁|恢复|处理|谢谢' }
# age-secret-key: '私钥', override: { ip-version: dual, additional-suffix: '后缀', proxy-name: [{ pattern: "替换前" target: "替换后" }] }
proxy-providers:
  link1: { <<: *providers, url: 'https://yinqinhangtian.polyinqin.com/s/de2e38e4c4368ee72e9e35ee4b292419', path: ./providers/link1.yaml }
  link2: { <<: *providers, url: 'https://emo.198790.xyz/api/v1/client/subscribe?token=a9c5dffe0f119218a0357286692dff04', path: ./providers/link2.yaml }
  link3: { <<: *providers, url: 'https://234.qzz.io/fsllistyaml', path: ./providers/link3.yaml }
# 策略分组
use: &use { use: [link1,link2,link3] }

ipv6: false
allow-lan: false
bind-address: '*'
mode: rule
log-level: info

unified-delay: true
tcp-concurrent: true
find-process-mode: 'off'
disable-keep-alive: false
keep-alive-interval: 15
keep-alive-idle: 300
etag-support: true

profile:
  store-selected: true
  store-fake-ip: true

experimental:
  quic-go-disable-gso: false
  quic-go-disable-ecn: true
  dialer-ip4p-convert: false

# =====================
# TUN（工业稳定版）
# =====================
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: false
  disable-icmp-forwarding: true
  dns-hijack:
    - any:53
    - tcp://any:53

# =====================
# DNS（稳定核心）
# =====================
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip

  fake-ip-range: 198.18.0.0/15

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - 8.8.8.8
    - 1.1.1.1

  fallback:
    - https://dns.google/dns-query
    - https://dns.quad9.net/dns-query

  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - 'localhost'
    - '*.github.com'
    - '*.githubusercontent.com'
    - '*.ghcr.io'
    - '*.apple.com'

# =====================
# hosts（保留你的）
# =====================
hosts:
  dns.alidns.com: [223.5.5.5,223.6.6.6]
  doh.pub: [120.53.53.53,1.12.12.21]
  dns.google: [8.8.8.8,8.8.4.4]
  dns.quad9.net: [9.9.9.9,149.112.112.112]

  services.googleapis.cn: services.googleapis.com
  google.cn: google.com
  cn.bing.com: global.bing.com

# =====================
# rule providers（原样保留）
# =====================
rule-providers:
  ads:
    type: http
    interval: 86400
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/ads.mrs
    path: ./rules/ads.mrs

  ai:
    type: http
    interval: 86400
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/ai.mrs
    path: ./rules/ai.mrs

  proxy@direct:
    type: http
    interval: 86400
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/proxy@direct.mrs
    path: ./rules/proxy@direct.mrs

  proxy-lite:
    type: http
    interval: 86400
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/proxy-lite.mrs
    path: ./rules/proxy-lite.mrs

  direct-lite:
    type: http
    interval: 86400
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/direct-lite.mrs
    path: ./rules/direct-lite.mrs

  dnsmasq-china-lite:
    type: http
    interval: 86400
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/dnsmasq-china-lite.mrs
    path: ./rules/dnsmasq-china-lite.mrs

  telegram_ip:
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs
    url: https://raw.githubusercontent.com/echs-top/proxy/main/mrs/ip/telegram.mrs
    path: ./rules/telegram_ip.mrs

  direct_ip:
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs
    url: https://raw.githubusercontent.com/echs-top/proxy/main/mrs/ip/direct.mrs
    path: ./rules/direct_ip.mrs

# =====================
# sniffer（最小稳定）
# =====================
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443]

# =====================
# rules（完全不改逻辑）
# =====================
rules:
  - DST-PORT,5228-5230,直接连接
  - SUB-RULE,(RULE-SET,telegram_ip,no-resolve),sub-telegram
  - RULE-SET,ads,REJECT
  - SUB-RULE,(RULE-SET,ai),sub-ai
  - RULE-SET,proxy@direct,直接连接
  - SUB-RULE,(RULE-SET,proxy-lite),sub-proxy
  - RULE-SET,direct-lite,直接连接
  - RULE-SET,direct_ip,直接连接
  - AND,((NETWORK,udp),(DST-PORT,443)),代理QUIC
  - MATCH,代理连接

# =====================
# sub-rules（原逻辑保留）
# =====================
sub-rules:
  sub-ai:
    - AND,((NETWORK,udp),(DST-PORT,443))
    - MATCH,国外AI

  sub-telegram:
    - AND,((NETWORK,udp),(DST-PORT,443))
    - MATCH,TELEGRAM

  sub-proxy:
    - AND,((NETWORK,udp),(DST-PORT,443))
    - MATCH,代理连接

# =====================
# proxy-groups（工业级修复核心）
# =====================
proxy-groups:

  - name: 代理连接
    type: select
    proxies:
      - 最低延迟
      - 香港
      - 台湾
      - 新加坡
      - 日本
      - 韩国
      - 美国
      - 加拿大
      - 德国
      - 英国
      - 法国
      - 荷兰
      - DIRECT

  - name: 直接连接
    type: select
    proxies:
      - DIRECT

  - name: 代理DNS
    type: select
    proxies:
      - 代理连接
      - DIRECT

  - name: 代理QUIC
    type: select
    proxies:
      - PASS-RULE
      - REJECT

  - name: 国外AI
    type: select
    proxies:
      - 代理连接
      - 美国
      - 新加坡
      - 日本

  - name: TELEGRAM
    type: select
    proxies:
      - 代理连接
      - 新加坡
      - 香港
      - 美国

  # =====================
  # 地区组（工业稳定核心）
  # ✔ 不用 fallback
  # ✔ 不用 include-all-providers
  # ✔ 不会报错
  # =====================

  - name: 香港
    type: select
    proxies:
      - 代理连接

  - name: 台湾
    type: select
    proxies:
      - 代理连接

  - name: 新加坡
    type: select
    proxies:
      - 代理连接

  - name: 日本
    type: select
    proxies:
      - 代理连接

  - name: 韩国
    type: select
    proxies:
      - 代理连接

  - name: 美国
    type: select
    proxies:
      - 代理连接

  - name: 加拿大
    type: select
    proxies:
      - 代理连接

  - name: 德国
    type: select
    proxies:
      - 代理连接

  - name: 英国
    type: select
    proxies:
      - 代理连接

  - name: 法国
    type: select
    proxies:
      - 代理连接

  - name: 荷兰
    type: select
    proxies:
      - 代理连接

  - name: 最低延迟
    type: url-test
    proxies:
      - 代理连接
