# =============================== 代理配置 ===============================

# 机场/代理提供者设置，用于从不同的来源提供代理节点

dy: &dy

    type: http

    udp: true

    interval: 86400

    proxy: DIRECTLY

    lazy: true

    health-check:

      enable: true

      url: https://cp.cloudflare.com/generate_204

      interval: 600

      timeout: 5 # 秒

      lazy: true

      expected-status: "204"

      method: HEAD

# ⚠️ smux 多路复用：部分机场不支持，如连接失败请注释本段

    smux: # smux（连接复用，提升多路复用效率，减少握手）

      enabled: true  # 开启 smux 多路复用

      padding: true  # 增加随机数据，防探测（推荐开）

      protocol: smux # 或 smux4



u: &u     # 所有订阅组引用

  use:

    - 1.p1

    - 2.p2

    - 3.p3

    - 4.p4



u_s: &u_s # 主用订阅组引用

  use:

    - 2.p2

    - 3.p3

    - 4.p4



# 各种代理提供者（机场）的订阅配置

proxy-providers:

  1.p1:

    url: "https://yinqinhangtian.polyinqin.com/s/de2e38e4c4368ee72e9e35ee4b292419"

    path: ./proxy_provider/p1.yaml 

    <<: *dy

    override:

      additional-prefix: "p1 »"



  2.p2:

    url: "https://emo.198790.xyz/api/v1/client/subscribe?token=a9c5dffe0f119218a0357286692dff04"

    path: ./proxy_provider/p2.yaml

    <<: *dy

    override:

      additional-prefix: "p2 »"



  3.p3: 

    url: "https://234.qzz.io/fsllistyaml"

    path: ./proxy_provider/p3.yaml 

    <<: *dy

    override:

      additional-prefix: "p3 »"



  4.p4: 

    url: ""

    path: ./proxy_provider/p4.yaml 

    <<: *dy

    override:

      additional-prefix: "p4 »"





# =============================== 节点信息 ===============================

proxies:

  - {name: DIRECTLY, type: direct, udp: true}

#  - {name: 家宽, type: http, server: "家庭宽带节点的IP地址", port: 1080, udp: true}

